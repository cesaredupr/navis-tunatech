version: '3.8'
services:

  postgis:
    image: postgis/postgis:15-3.3
    container_name: navis_postgis
    environment:
      POSTGRES_DB: navis_tunatech
      POSTGRES_USER: navis_admin
      POSTGRES_PASSWORD: navis2025
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navis_admin -d navis_tunatech"]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: navis_geoserver
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: NavisGeo2025
    ports:
      - "8090:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    depends_on:
      postgis:
        condition: service_healthy

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: navis_valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./valhalla/data:/custom_files
    environment:
      - use_tiles_ignore_pbf=True
      - build_elevation=False

volumes:
  postgis_data:
  geoserver_data:
